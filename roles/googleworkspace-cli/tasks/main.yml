---
- name: Install Google Workspace CLI
  community.general.homebrew:
    name: googleworkspace-cli
    state: present

- name: Ensure Google Workspace CLI is linked
  command: brew link googleworkspace-cli
  register: gws_link
  changed_when: "'symlinks created' in gws_link.stdout"
  failed_when: false

- name: Force relink Google Workspace CLI if needed
  command: brew unlink googleworkspace-cli && brew link googleworkspace-cli
  when: gws_link.rc != 0
  changed_when: true
