---
- name: Ensure resources directory exists
  file:
    path: "{{ ansible_facts.env.HOME }}/resources"
    state: directory

- name: Clone dotfiles repository
  ansible.builtin.git:
    repo: https://github.com/codingalone/dotfiles.git
    dest: "{{ ansible_facts.env.HOME }}/resources/dotfiles"
    update: false

- name: Stow dotfiles packages (adopt existing files)
  command:
    cmd: stow --adopt --target={{ ansible_facts.env.HOME }} --dir={{ ansible_facts.env.HOME }}/resources/dotfiles --ignore='\.DS_Store' --verbose {{ item }}
  loop:
    - fish
    - ghostty
    - cmux
    - nvim
    - karabiner
  register: stow_result
  changed_when: stow_result.stderr | length > 0

- name: Restore dotfiles content overwritten by --adopt
  command:
    cmd: git -C {{ ansible_facts.env.HOME }}/resources/dotfiles checkout -- .
  changed_when: false
