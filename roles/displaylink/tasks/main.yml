---
- name: Check if DisplayLink Manager is already installed
  stat:
    path: /Applications/DisplayLink Manager.app
  register: displaylink_installed

- name: Install DisplayLink Manager
  community.general.homebrew_cask:
    name: displaylink
    state: present
    sudo_password: "{{ ansible_become_password | default(omit) }}"
  when: not displaylink_installed.stat.exists
